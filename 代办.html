<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>灵感&内容管理</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}:root{--primary:#2563eb;--danger:#dc2626;--gray-100:#f3f4f6;--gray-300:#d1d5db;--gray-600:#4b5563;--gray-800:#1f2937;--radius:8px;--shadow:0 1px 2px rgba(0,0,0,0.05)}body{background:#f9fafb;color:var(--gray-800);line-height:1.5;min-height:100vh}.hidden{display:none!important}.container{max-width:768px;margin:0 auto;padding:0 16px}.btn{padding:8px 14px;border:none;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500}.btn-primary{background:var(--primary);color:#fff}.btn-danger{background:var(--danger);color:#fff}.btn-outline{background:transparent;border:1px solid var(--gray-300);color:var(--gray-800)}.input,.textarea{width:100%;padding:12px 14px;border:1px solid var(--gray-300);border-radius:var(--radius);font-size:16px;background:#fff}.input:focus,.textarea:focus{outline:none;border-color:var(--primary)}.card{border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border-left:none!important}#auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.auth-card{width:100%;max-width:400px;background:#fff;padding:32px 24px}.auth-card h1{text-align:center;margin-bottom:24px;font-size:24px}.auth-form .input{margin-bottom:16px}.auth-form .btn{width:100%;margin-bottom:12px;padding:12px}#app-container{padding:16px 0}.app-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:8px}.header-actions{display:flex;gap:8px}.tab-nav{display:flex;background:#fff;border-radius:var(--radius);padding:4px;margin-bottom:20px;box-shadow:var(--shadow)}.tab-item{flex:1;text-align:center;padding:10px 0;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500}.tab-item.active{background:var(--primary);color:#fff}.add-form{background:#fff;padding:16px;margin-bottom:20px}.form-row{margin-bottom:12px}.form-row label{display:block;font-size:14px;margin-bottom:6px}.form-actions{display:flex;gap:8px;justify-content:flex-end}.item-content{font-size:14px;margin-bottom:10px;white-space:pre-wrap;word-break:break-all}.item-content a{color:var(--primary);text-decoration:none}.item-meta{font-size:12px;color:var(--gray-600);margin-bottom:8px}.item-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}.item-actions .btn{padding:6px 10px;font-size:12px}.loading,.empty-tip{text-align:center;padding:40px 0;color:var(--gray-600)}</style></head><body><div id="auth-container"><div class="auth-card"><h1>灵感&内容管理</h1><form id="auth-form" class="auth-form"><input type="email" id="email" class="input" placeholder="邮箱" required><input type="password" id="password" class="input" placeholder="密码（≥6位）" required><button type="submit" class="btn btn-primary">登录</button><button type="button" id="register-btn" class="btn btn-outline">注册</button></form></div></div><div id="app-container" class="container hidden"><div class="app-header"><div class="header-actions"><button id="add-btn" class="btn btn-primary">+ 新增</button><button id="refresh-btn" class="btn btn-outline">刷新</button></div><button id="logout-btn" class="btn btn-outline">退出</button></div><div class="tab-nav"><div class="tab-item active" data-type="inspiration">灵感捕捉</div><div class="tab-item" data-type="content">内容囤积</div></div><div id="add-form" class="add-form hidden"><div class="form-row"><label for="item-content">内容（支持[https://xxx]插入链接）</label><textarea id="item-content" class="textarea" rows="5" placeholder="必填，填写完整内容" required></textarea></div><div class="form-actions"><button id="cancel-add-btn" class="btn btn-outline">取消</button><button id="save-item-btn" class="btn btn-primary">保存</button></div><input type="hidden" id="edit-item-id" value=""></div><div id="item-list"><div class="loading">加载中...</div></div></div><script>const SUPABASE_URL="https://piztdfuhwepukszawxyr.supabase.co";const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpenRkZnVod2VwdWtzemF3eHlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTkzOTUyNDksImV4cCI6MjA3NDk3MTI0OX0.8wrAPR05KKzQgRd5Bh4vDXiwpqHBPwpcckioj1KKbkA";const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);let currentTab="inspiration";const memCache={inspiration:[],content:[]};function parseContent(content){if(!content)return"";return content.replace(/\[(\w+:\/\/\S+?)\]/g,'<a href="$1" target="_blank">$1</a>');}function getTimeColor(createdAt){const days=Math.floor((new Date()-new Date(createdAt))/(1000 * 60 * 60 * 24));if(days<=5)return"#EFF6FF";if(days<=10)return"#DBEAFE";if(days<=15)return"#BFDBFE";if(days<=20)return"#93C5FD";if(days<=25)return"#60A5FA";if(days<=30)return"#3B82F6";return"#2563EB";}async function checkAuth(){const{data:{session}}=await supabaseClient.auth.getSession();session?showApp():showAuth();}function showApp(){document.getElementById("auth-container").classList.add("hidden");document.getElementById("app-container").classList.remove("hidden");loadAllData();}function showAuth(){memCache.inspiration=[];memCache.content=[];document.getElementById("auth-container").classList.remove("hidden");document.getElementById("app-container").classList.add("hidden");}document.getElementById("auth-form").addEventListener("submit",async e=>{e.preventDefault();const{error}=await supabaseClient.auth.signInWithPassword({email:document.getElementById("email").value,password:document.getElementById("password").value});error?alert(error.message):checkAuth();});document.getElementById("register-btn").addEventListener("click",async()=>{const{error}=await supabaseClient.auth.signUp({email:document.getElementById("email").value,password:document.getElementById("password").value});error?alert(error.message):alert("注册成功！请验证邮箱");});document.getElementById("logout-btn").addEventListener("click",async()=>{await supabaseClient.auth.signOut();showAuth();});async function loadAllData(){document.getElementById("item-list").innerHTML='<div class="loading">加载中...</div>';const{data,error}=await supabaseClient.from("personal_items").select("*").in("type",["inspiration","content"]).order("created_at",{ascending:false});if(error){document.getElementById("item-list").innerHTML=`<div class="empty-tip">加载失败：${error.message}</div>`;return;}memCache.inspiration=data.filter(item=>item.type==="inspiration");memCache.content=data.filter(item=>item.type==="content");renderList();}function renderList(){const listEl=document.getElementById("item-list");const data=memCache[currentTab];if(data.length===0){listEl.innerHTML='<div class="empty-tip">暂无数据</div>';return;}let html="";data.forEach(item=>{const bgColor=getTimeColor(item.created_at);html+=`<div class="card" style="background-color: ${bgColor}"><div class="item-content">${parseContent(item.content)}</div><div class="item-meta">${new Date(item.created_at).toLocaleString()} | ${item.type==="inspiration"?"灵感":"内容"}</div><div class="item-actions"><button class="btn btn-outline edit-btn" data-id="${item.id}">编辑</button><button class="btn btn-danger delete-btn" data-id="${item.id}">删除</button></div></div>`;});listEl.innerHTML=html;bindEvents();}function openForm(id=null){document.getElementById("add-form").classList.remove("hidden");document.getElementById("edit-item-id").value=id||"";if(!id){document.getElementById("item-content").value="";}else{const item=memCache[currentTab].find(i=>i.id===id);if(item)document.getElementById("item-content").value=item.content;}document.getElementById("item-content").focus();}async function saveItem(){const id=document.getElementById("edit-item-id").value;const content=document.getElementById("item-content").value.trim();if(!content){alert("请填写内容");return;}const itemData={type:currentTab,content,status:"active"};let error;const{data:{user}}=await supabaseClient.auth.getUser();if(id){({error}=await supabaseClient.from("personal_items").update(itemData).eq("id",id));}else{itemData.user_id=user.id;({error}=await supabaseClient.from("personal_items").insert(itemData));}if(error){alert(error.message);}else{document.getElementById("add-form").classList.add("hidden");loadAllData();}}async function deleteItem(id){const{error}=await supabaseClient.from("personal_items").delete().eq("id",id);if(error){alert(error.message);}else{loadAllData();}}function bindEvents(){document.querySelectorAll(".edit-btn").forEach(btn=>btn.onclick=()=>openForm(btn.dataset.id));document.querySelectorAll(".delete-btn").forEach(btn=>btn.ondblclick=()=>deleteItem(btn.dataset.id));}document.querySelectorAll(".tab-item").forEach(tab=>{tab.addEventListener("click",()=>{document.querySelectorAll(".tab-item").forEach(t=>t.classList.remove("active"));tab.classList.add("active");currentTab=tab.dataset.type;renderList();});});document.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.ctrlKey&&!e.shiftKey&&!(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")){e.preventDefault();openForm();}});document.getElementById("add-btn").addEventListener("click",()=>openForm());document.getElementById("cancel-add-btn").addEventListener("click",()=>document.getElementById("add-form").classList.add("hidden"));document.getElementById("save-item-btn").addEventListener("click",saveItem);document.getElementById("refresh-btn").addEventListener("click",loadAllData);checkAuth();</script></body></html>
